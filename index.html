<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Adio's 2026 | Digital Farewell Slam Book</title>
    <meta name="description"
        content="A digital farewell slam book for college memories. Write notes, share photos, and preserve memories.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Splash Screen -->
    <div id="splash-screen" class="overlay active">
        <video id="intro-video" autoplay muted playsinline>
            <source src="intro.mp4" type="video/mp4">
        </video>
    </div>

    <!-- Main Container -->
    <main id="main-app" class="hidden">
        <!-- Name Selection Page -->
        <section id="name-selection" class="page active">
            <header>
                <h2 class="pink-text">Select a Name</h2>
                <p>Choose a friend to write a note or view your book</p>
            </header>
            <div class="search-container">
                <input type="text" id="student-search" placeholder="🔍 Search for a name...">
            </div>
            <div id="student-list" class="grid-list">
                <!-- Names will be injected here -->
            </div>
        </section>

        <!-- Book Container -->
        <section id="book-container" class="page hidden">
            <button id="back-to-list" class="back-btn">&larr; Back</button>
            <div class="book-wrapper">
                <div id="book" class="book">
                    <div class="book-cover">
                        <img src="cover.jpg" alt="Book Cover" class="book-cover-img">
                        <div class="cover-content">
                            <h3 id="selected-student-name">Name</h3>
                            <p>Slam Book 2026</p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="options-overlay" class="options-menu glass hidden">
                <h3>Select Action</h3>
                <div class="btn-group">
                    <button id="btn-write-note" class="pink-btn">Write Note ✍️</button>
                    <button id="btn-personal-view" class="pink-btn secondary">Personal View 🔐</button>
                </div>
            </div>
        </section>

        <!-- Write Note Screen -->
        <section id="write-note-screen" class="page hidden">
            <button class="back-btn close-action">&larr; Back</button>
            <div class="card glass">
                <h3>Write a Note for <span id="note-for-name">Name</span></h3>
                <form id="note-form">
                    <div class="form-group">
                        <label for="message">Your Message (Anonymous)</label>
                        <textarea id="message" rows="5" placeholder="Write something beautiful..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="image-upload" class="file-label">
                            <span class="icon">📸</span> Add an Image
                            <input type="file" id="image-upload" accept="image/*">
                        </label>
                        <div id="image-preview" class="hidden"></div>
                    </div>
                    <div id="upload-progress" class="hidden">
                        <div class="progress-container">
                            <div id="progress-bar" class="progress-fill"></div>
                        </div>
                        <p id="progress-text" class="progress-status">Optimizing...</p>
                    </div>
                    <button type="submit" class="pink-btn full">Save Memory ✨</button>
                </form>
            </div>
        </section>

        <!-- Login Screen -->
        <section id="login-screen" class="page hidden">
            <button class="back-btn close-action">&larr; Back</button>
            <div class="card glass login-card">
                <h3>Access Your Slam Book</h3>
                <p>Enter your details to view your messages</p>
                <form id="login-form">
                    <div class="form-group">
                        <label for="dob">Date of Birth</label>
                        <input type="date" id="dob" min="2000-01-01" max="2005-12-31" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="pink-btn full">Login 🔓</button>
                </form>
            </div>
        </section>

        <!-- Slam Book Carousel View -->
        <section id="viewer-screen" class="page hidden">
            <button id="close-viewer" class="back-btn">&larr; Exit</button>
            <div class="viewer-header">
                <h2 id="viewer-title">B BHUVANESAN's Slam Book</h2>
            </div>
            <div class="carousel-container">
                <div id="pages-container" class="pages-wrapper">
                    <!-- Pages will be injected here -->
                </div>
                <div class="carousel-controls">
                    <button id="prev-page" class="nav-btn">&larr;</button>
                    <span id="page-indicator">Page 1 of 1</span>
                    <button id="next-page" class="nav-btn">&rarr;</button>
                </div>
            </div>
        </section>
    </main>

    <script type="module" src="app.js"></script>
</body>

</html>
